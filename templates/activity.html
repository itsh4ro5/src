<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H4R Activity Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;700&display=swap');
        
        :root { --accent: #3b82f6; --glow: rgba(59, 130, 246, 0.4); --bg-grad: #0f172a; }
        .premium-ui { --accent: #f59e0b; --glow: rgba(245, 158, 11, 0.4); --bg-grad: #1e1b4b; }
        .owner-ui { --accent: #a855f7; --glow: rgba(168, 85, 247, 0.4); --bg-grad: #2e1065; }

        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; }
        .console-text { font-family: 'Fira Code', monospace; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        
        .live-pulse { box-shadow: 0 0 10px var(--accent); animation: pulse-border 2s infinite; }
        @keyframes pulse-border {
            0% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 0 0 var(--glow); }
            50% { border-color: var(--accent); box-shadow: 0 0 15px var(--glow); }
            100% { border-color: rgba(255,255,255,0.1); box-shadow: 0 0 0 0 transparent; }
        }
    </style>
</head>
<body class="pb-6 h-screen flex flex-col">

    <div class="p-4 flex-shrink-0">
        <div class="flex justify-between items-center mb-4 pt-2">
            <button onclick="window.location.href='/dashboard'" class="w-10 h-10 glass rounded-full flex justify-center items-center text-white hover:bg-white/10 active:scale-90 transition-all"><i class="fas fa-arrow-left"></i></button>
            <h1 class="text-[11px] font-black tracking-[0.3em] uppercase text-gray-300 flex items-center"><i class="fas fa-terminal mr-2 text-[var(--accent)]"></i> LIVE CONSOLE</h1>
            <button onclick="syncRealData()" class="w-10 h-10 glass rounded-full flex justify-center items-center text-[var(--accent)] hover:bg-[var(--accent)]/20 active:scale-90 transition-all"><i class="fas fa-sync-alt"></i></button>
        </div>

        <div id="live-card-container" class="glass p-4 mb-4 relative overflow-hidden bg-black/40">
            <div class="absolute top-0 right-0 w-32 h-32 bg-[var(--accent)] rounded-full blur-[80px] opacity-10"></div>
            
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[9px] font-bold text-gray-400 tracking-widest uppercase flex items-center"><span class="w-2 h-2 rounded-full bg-[var(--accent)] animate-ping mr-2 hidden" id="ping-dot"></span> Current Process</h3>
                <span class="text-[9px] console-text text-[var(--accent)] border border-[var(--accent)]/30 px-2 py-0.5 rounded bg-[var(--accent)]/10" id="live-speed">IDLE</span>
            </div>

            <p id="live-file" class="console-text text-xs text-white truncate mb-2">Awaiting new tasks...</p>
            
            <div class="flex justify-between items-end mb-1">
                <p id="live-status-text" class="console-text text-[10px] text-gray-500">System Idle</p>
                <p id="live-percentage" class="console-text text-xs font-bold text-[var(--accent)]">0%</p>
            </div>
            
            <div class="h-1.5 w-full bg-gray-800 rounded-full overflow-hidden">
                <div id="live-bar" class="h-full bg-[var(--accent)] transition-all duration-300 shadow-[0_0_10px_var(--glow)]" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-2 px-1">
            <h3 class="text-[10px] font-bold text-gray-500 tracking-widest uppercase"><i class="fas fa-history mr-1"></i> Execution Log</h3>
            <span class="text-[9px] text-gray-600 console-text">Real-time Sync</span>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 custom-scrollbar" id="log-container">
        <div id="logs-list" class="space-y-3 pb-6">
            <div class="flex flex-col items-center justify-center py-10 opacity-50">
                <i class="fas fa-satellite-dish text-3xl text-gray-600 mb-3 animate-pulse"></i>
                <p class="console-text text-[10px] text-gray-500">Connecting to server...</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const uid = tg.initDataUnsafe.user?.id || 5842838338;

        async function applyTheme() {
            try {
                const r = await fetch(`/api/profile/${uid}`);
                const pData = await r.json();
                if(pData.role === "premium") {
                    document.documentElement.style.setProperty('--accent', '#f59e0b');
                    document.documentElement.style.setProperty('--glow', 'rgba(245, 158, 11, 0.4)');
                } else if(pData.role === "owner") {
                    document.documentElement.style.setProperty('--accent', '#a855f7');
                    document.documentElement.style.setProperty('--glow', 'rgba(168, 85, 247, 0.4)');
                }
            } catch(e) {}
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-list');
            if(!logs || logs.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-10 opacity-50">
                        <i class="fas fa-ghost text-3xl text-gray-600 mb-3"></i>
                        <p class="console-text text-[10px] text-gray-500">No genuine logs found yet.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            logs.forEach(log => {
                const statusColor = log.status === 'success' ? 'text-green-400' : 'text-red-400';
                const statusIcon = log.status === 'success' ? 'fa-check-circle' : 'fa-times-circle';

                const html = `
                <div class="glass p-3 border border-white/5 bg-gradient-to-br from-black/60 to-black/20 hover:border-white/10 transition-colors rounded-xl">
                    <div class="flex justify-between items-start mb-2 border-b border-white/10 pb-2">
                        <div class="w-4/5">
                            <h4 class="console-text text-[11px] text-white truncate"><i class="${statusIcon} ${statusColor} mr-1"></i> ${log.file_name}</h4>
                            <p class="console-text text-[8px] text-gray-500 mt-1">
                                <span class="text-blue-400">${log.source}</span> <i class="fas fa-caret-right mx-1"></i> <span class="text-purple-400">${log.dest}</span>
                            </p>
                        </div>
                        <span class="console-text text-[8px] text-gray-500">${log.time}</span>
                    </div>

                    <div class="grid grid-cols-1 gap-2 mb-2">
                        <div class="bg-gray-900/50 p-2 rounded border border-gray-800">
                            <p class="console-text text-[7px] text-gray-500 uppercase tracking-widest mb-1">Original Caption</p>
                            <p class="text-[9px] text-gray-400 line-clamp-2 italic">${log.orig_caption}</p>
                        </div>
                        <div class="bg-[var(--accent)]/5 p-2 rounded border border-[var(--accent)]/20">
                            <p class="console-text text-[7px] text-[var(--accent)] uppercase tracking-widest mb-1 flex items-center"><i class="fas fa-robot mr-1"></i> AI Generated Caption</p>
                            <p class="text-[10px] text-white line-clamp-2">${log.ai_caption}</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mt-2 pt-2 border-t border-white/5">
                        <div class="flex gap-3">
                            <p class="console-text text-[8px] text-gray-400"><i class="fas fa-stopwatch text-yellow-500 mr-1"></i> Taken: <span class="text-white">${log.time_taken}</span></p>
                            <p class="console-text text-[8px] text-gray-400"><i class="fas fa-coffee text-orange-400 mr-1"></i> Break: <span class="text-white">${log.break_time}</span></p>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += html;
            });
        }

        async function syncRealData() {
            try {
                // 🟢 1. FETCH REAL LIVE PROGRESS 
                const resStatus = await fetch(`/api/status/${uid}`);
                const dStatus = await resStatus.json();
                
                const liveContainer = document.getElementById('live-card-container');
                const liveBar = document.getElementById('live-bar');
                const livePercent = document.getElementById('live-percentage');
                const liveText = document.getElementById('live-status-text');
                const liveFile = document.getElementById('live-file');
                const liveSpeed = document.getElementById('live-speed');
                const pingDot = document.getElementById('ping-dot');
                
                if(dStatus.live && dStatus.live.percentage !== undefined) {
                    liveContainer.classList.add('live-pulse');
                    pingDot.classList.remove('hidden');
                    liveBar.style.width = dStatus.live.percentage + '%';
                    livePercent.innerText = dStatus.live.percentage + '%';
                    liveFile.innerText = `File ${dStatus.live.current} of ${dStatus.live.total} Processing...`;
                    liveText.innerText = "Extracting Data...";
                    liveSpeed.innerText = "ACTIVE";
                } else {
                    liveContainer.classList.remove('live-pulse');
                    pingDot.classList.add('hidden');
                    liveBar.style.width = '0%';
                    livePercent.innerText = '0%';
                    liveFile.innerText = "Awaiting new tasks...";
                    liveText.innerText = "System Idle";
                    liveSpeed.innerText = "IDLE";
                }

                // 🟢 2. FETCH REAL FILE LOGS
                const resLogs = await fetch(`/api/file_logs/${uid}`);
                const dLogs = await resLogs.json();
                renderLogs(dLogs.logs);

            } catch(e) { console.log("Real Data Sync Error:", e); }
        }

        applyTheme();
        setInterval(syncRealData, 2500); // Har 2.5 Sec me DB se naya real data aayega
        syncRealData();
    </script>
</body>
</html>
